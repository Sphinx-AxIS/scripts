# Manifest for a single script folder under scripts/<category>/<script-name>/
# Copy this file as manifest.yml inside the script folder and fill it in.
# Required fields are uncommented. Optional fields are commented out — uncomment
# any that apply.

# --- Identity --------------------------------------------------------------

# Short identifier — must match the script folder name (kebab-case).
name: <script-folder-name>

# Human-readable title for catalog display.
display_name: <Human Readable Title>

# One- to three-sentence description. Pulled into CATALOG.md.
summary: >
  <What this automation does and the problem it solves. Keep it tight —
  one to three sentences.>

# --- Classification --------------------------------------------------------

# Top-level folder under scripts/.
category: <carbon-black|elastic|file-system|forensics|llm>

language: PowerShell

# Production = stable, in active use.
# Beta       = functional but rough edges; review before production use.
# WIP        = under development; expect breakage.
status: <Production|Beta|WIP>

# --- Files in this folder --------------------------------------------------

# The script you invoke directly. For dot-sourced function files, name the
# file even though it is not "run" in the conventional sense.
entry_point: <Script-Name.ps1>

# Optional — list supporting scripts and what each one does. Omit for
# single-file scripts.
# components:
#   - name: <Helper-One.ps1>
#     description: <What this supporting script does.>
#   - name: <Helper-Two.ps1>
#     description: <What this supporting script does.>

# Optional — non-script support files (config, lookup tables, etc.).
# support_files:
#   - name: whitelist.txt
#     description: One entry per line; lines starting with # are ignored.

# --- Runtime profile -------------------------------------------------------

requirements:
  os: <Windows|Cross-platform>
  powershell: ">=5.1"   # or ">=7.0" if PS Core required
  # software:
  #   - <Microsoft Word — for legacy .doc COM automation>
  #   - <Microsoft Excel — for XLSX output>
  # network:
  #   - <Carbon Black server endpoint>
  # credentials:
  #   - <Carbon Black API key>
  #   - <SPOC C API key>
  # filesystem:
  #   - <NTFS volume — required for alternate data streams>

# --- Data flow -------------------------------------------------------------

# Inputs the script consumes (parameters, files, API responses).
inputs:
  - <e.g. -InputPath: path to file under review>
  - <e.g. Carbon Black API key via -ApiKey or environment>

# Outputs the script produces (files, console output, return objects).
outputs:
  - <e.g. CSV at -OutputPath>
  - <e.g. PSCustomObject on the pipeline>

# --- Cross-reference -------------------------------------------------------

# Free-form tags used by CAPABILITY_MATRIX.md. Prefer kebab-case. Reuse
# existing tags where they fit; add new ones sparingly.
tags:
  - <category-tag>     # e.g. carbon-black, ntfs, llm
  - <function-tag>     # e.g. triage, hashing, keyword-search
  - <output-tag>       # e.g. reporting, data-processing
  - powershell

# --- Optional metadata -----------------------------------------------------

# maintainer: <name or GitHub handle>
# created: <YYYY-MM-DD>
# updated: <YYYY-MM-DD>
# related:
#   - <other-script-name>     # e.g. companion or downstream tool
# notes: >
#   <Caveats, known limitations, planned improvements, links to issues, etc.>
