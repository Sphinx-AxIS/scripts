# Manifest for a single script folder under scripts/<category>/<script-name>/
# Copy this file as manifest.yml inside the script folder and fill it in.
# Required fields are uncommented. Optional fields are commented out — uncomment
# any that apply.

# --- Identity --------------------------------------------------------------

# Short identifier — must match the script folder name (kebab-case).
name: get-codex-usage

# Human-readable title for catalog display.
display_name: Get Codex Usage

# One- to three-sentence description. Pulled into CATALOG.md.
summary: >
  Parses local Codex (.jsonl) session logs and reports real-time token usage,
  context window utilization, burn rate (average and peak), rate-limit status
  with reset timing, and warnings when context exhaustion or large requests
  are imminent. Helps decide when to start a fresh Codex session.

# --- Classification --------------------------------------------------------

# Top-level folder under scripts/.
category: llm

language: PowerShell

# Production = stable, in active use.
# Beta       = functional but rough edges; review before production use.
# WIP        = under development; expect breakage.
status: Production

# --- Files in this folder --------------------------------------------------

# The script you invoke directly. For dot-sourced function files, name the
# file even though it is not "run" in the conventional sense.
entry_point: Get-CODEXUsage.ps1

# Optional — list supporting scripts and what each one does. Omit for
# single-file scripts.
# components:
#   - name: <Helper-One.ps1>
#     description: <What this supporting script does.>

# Optional — non-script support files (config, lookup tables, etc.).
# support_files:
#   - name: whitelist.txt
#     description: One entry per line; lines starting with # are ignored.

# --- Runtime profile -------------------------------------------------------

requirements:
  os: Windows
  powershell: ">=5.1"
  software:
    - Codex (VS Code extension)  # script reads its locally written session logs
  filesystem:
    - Local Codex session logs at $HOME\.codex\sessions\
  permissions:
    - Read access to the Codex sessions directory

# --- Data flow -------------------------------------------------------------

# Inputs the script consumes (parameters, files, API responses).
inputs:
  - -SessionFile          # optional path to a specific .jsonl session; defaults to the most recent file under $HOME\.codex\sessions\
  - -RecentEventsForAverage  # optional integer, default 5; window size for the burn-rate average and peak

# Outputs the script produces (files, console output, return objects).
outputs:
  - Console report covering total token usage, context window utilization, burn rate (average and peak), remaining-turn estimates, primary and secondary rate limits, and "heat" warnings

# --- Cross-reference -------------------------------------------------------

# Free-form tags used by CAPABILITY_MATRIX.md. Prefer kebab-case. Reuse
# existing tags where they fit; add new ones sparingly.
tags:
  - llm
  - codex
  - diagnostics
  - observability
  - token-usage
  - powershell

# --- Optional metadata -----------------------------------------------------

# maintainer: <name or GitHub handle>
# created: <YYYY-MM-DD>
# updated: <YYYY-MM-DD>
# related:
#   - <other-script-name>
notes: >
  Reads from $HOME\.codex\sessions\*.jsonl. If no -SessionFile is provided
  the most recent .jsonl is used. Best run periodically during a long Codex
  session — the README's rule of thumb is to start a new session when
  context utilization exceeds 75-80% or estimated turns left at average
  burn drops to 1 or below.
