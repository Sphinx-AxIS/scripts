# Manifest for a single script folder under scripts/<category>/<script-name>/
# Copy this file as manifest.yml inside the script folder and fill it in.
# Required fields are uncommented. Optional fields are commented out — uncomment
# any that apply.

# --- Identity --------------------------------------------------------------

# Short identifier — must match the script folder name (kebab-case).
name: hunt-for-alternate-datastreams

# Human-readable title for catalog display.
display_name: Hunt for NTFS Alternate Data Streams

# One- to three-sentence description. Pulled into CATALOG.md.
summary: >
  Lists and prints the contents of NTFS alternate data streams attached to a
  single target file, skipping the default unnamed $DATA stream. Useful for
  quickly inspecting whether a file carries hidden ADS payloads.

# --- Classification --------------------------------------------------------

# Top-level folder under scripts/.
category: forensics

language: PowerShell

# Production = stable, in active use.
# Beta       = functional but rough edges; review before production use.
# WIP        = under development; expect breakage.
status: WIP

# --- Files in this folder --------------------------------------------------

# The script you invoke directly. For dot-sourced function files, name the
# file even though it is not "run" in the conventional sense.
entry_point: Get-AlternateDataStreams.ps1

# Optional — list supporting scripts and what each one does. Omit for
# single-file scripts.
# components:
#   - name: <Helper-One.ps1>
#     description: <What this supporting script does.>

# Optional — non-script support files (config, lookup tables, etc.).
# support_files:
#   - name: whitelist.txt
#     description: One entry per line; lines starting with # are ignored.

# --- Runtime profile -------------------------------------------------------

requirements:
  os: Windows
  powershell: ">=5.1"
  filesystem:
    - NTFS volume  # alternate data streams are an NTFS feature
  permissions:
    - Read access to the target file

# --- Data flow -------------------------------------------------------------

# Inputs the script consumes (parameters, files, API responses).
inputs:
  - $path  # currently a hardcoded full file path inside the script

# Outputs the script produces (files, console output, return objects).
outputs:
  - Console output — one '==== [<stream-name>] (<bytes> bytes) ====' header per non-default stream, followed by the stream's raw contents

# --- Cross-reference -------------------------------------------------------

# Free-form tags used by CAPABILITY_MATRIX.md. Prefer kebab-case. Reuse
# existing tags where they fit; add new ones sparingly.
tags:
  - forensics
  - file-system
  - ntfs
  - alternate-data-streams
  - snippet
  - powershell

# --- Optional metadata -----------------------------------------------------

# maintainer: <name or GitHub handle>
# created: <YYYY-MM-DD>
# updated: <YYYY-MM-DD>
related:
  - get-file-metadata  # fuller metadata collector that also enumerates streams as part of broader output
notes: >
  WIP / snippet. The target file path is hardcoded ('D:\Tim\Downloads\...');
  there are no parameters or input validation. Output is raw stream content
  printed to the console — text streams will display, but binary streams
  will produce noise. To productionize: take -Path as a parameter, accept
  pipeline input, and add a switch for binary-safe (e.g. base64) output.
  There is no per-folder README yet.
