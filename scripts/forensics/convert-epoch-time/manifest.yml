# Manifest for a single script folder under scripts/<category>/<script-name>/
# Copy this file as manifest.yml inside the script folder and fill it in.
# Required fields are uncommented. Optional fields are commented out — uncomment
# any that apply.

# --- Identity --------------------------------------------------------------

# Short identifier — must match the script folder name (kebab-case).
name: convert-epoch-time

# Human-readable title for catalog display.
display_name: Convert Epoch Time to UTC

# One- to three-sentence description. Pulled into CATALOG.md.
summary: >
  Reads epoch-millisecond timestamps from a text file and writes a CSV
  mapping each value to its UTC ISO-8601 representation. Useful for quickly
  normalizing log timestamps during forensic review.

# --- Classification --------------------------------------------------------

# Top-level folder under scripts/.
category: forensics

language: PowerShell

# Production = stable, in active use.
# Beta       = functional but rough edges; review before production use.
# WIP        = under development; expect breakage.
status: WIP

# --- Files in this folder --------------------------------------------------

# The script you invoke directly. For dot-sourced function files, name the
# file even though it is not "run" in the conventional sense.
entry_point: ConvertEpoch-toHuman.ps1

# Optional — list supporting scripts and what each one does. Omit for
# single-file scripts.
# components:
#   - name: <Helper-One.ps1>
#     description: <What this supporting script does.>

# Optional — non-script support files (config, lookup tables, etc.).
# support_files:
#   - name: whitelist.txt
#     description: One entry per line; lines starting with # are ignored.

# --- Runtime profile -------------------------------------------------------

requirements:
  os: Cross-platform
  powershell: ">=5.1"
  permissions:
    - Read access to the input file
    - Write access to the output directory

# --- Data flow -------------------------------------------------------------

# Inputs the script consumes (parameters, files, API responses).
inputs:
  - epochs.txt  # one epoch-millisecond integer per line; loaded from the current working directory

# Outputs the script produces (files, console output, return objects).
outputs:
  - converted.csv  # two columns: EpochMS, UTC (ISO-8601 with offset); written to the current working directory

# --- Cross-reference -------------------------------------------------------

# Free-form tags used by CAPABILITY_MATRIX.md. Prefer kebab-case. Reuse
# existing tags where they fit; add new ones sparingly.
tags:
  - forensics
  - time
  - snippet
  - powershell

# --- Optional metadata -----------------------------------------------------

# maintainer: <name or GitHub handle>
# created: <YYYY-MM-DD>
# updated: <YYYY-MM-DD>
# related:
#   - <other-script-name>     # e.g. companion or downstream tool
notes: >
  WIP / snippet. Input and output paths are hardcoded relative to the current
  working directory (.\epochs.txt and .\converted.csv) and there are no
  parameters. To productionize this script: convert it to take -InputPath
  and -OutputPath, validate inputs, and add error handling for non-numeric
  lines. There is no per-folder README yet.
