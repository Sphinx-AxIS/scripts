# Manifest for a single script folder under scripts/<category>/<script-name>/
# Copy this file as manifest.yml inside the script folder and fill it in.
# Required fields are uncommented. Optional fields are commented out — uncomment
# any that apply.

# --- Identity --------------------------------------------------------------

# Short identifier — must match the script folder name (kebab-case).
name: search-file-for-keywords

# Human-readable title for catalog display.
display_name: Search File for Keywords

# One- to three-sentence description. Pulled into CATALOG.md.
summary: >
  Searches a single file for a user-supplied keyword list and writes each
  match to an output text file with line (or paragraph) numbers and the full
  surrounding line of context. Supports .txt, .log, .csv, .doc, and .docx
  inputs. Useful for document triage, keyword sweeps, and basic evidence
  screening.

# --- Classification --------------------------------------------------------

# Top-level folder under scripts/.
category: file-system

language: PowerShell

# Production = stable, in active use.
# Beta       = functional but rough edges; review before production use.
# WIP        = under development; expect breakage.
status: Beta

# --- Files in this folder --------------------------------------------------

# The script you invoke directly. For dot-sourced function files, name the
# file even though it is not "run" in the conventional sense.
entry_point: Search-Keywords.ps1

# Optional — list supporting scripts and what each one does. Omit for
# single-file scripts.
# components:
#   - name: <Helper-One.ps1>
#     description: <What this supporting script does.>

# Optional — non-script support files (config, lookup tables, etc.).
# support_files:
#   - name: whitelist.txt
#     description: One entry per line; lines starting with # are ignored.

# --- Runtime profile -------------------------------------------------------

requirements:
  os: Windows
  powershell: ">=5.1"
  software:
    - Microsoft Word  # required for .doc and .docx; not needed for .txt/.log/.csv
  permissions:
    - Read access to the input file and keyword file
    - Write access to the output path

# --- Data flow -------------------------------------------------------------

# Inputs the script consumes (parameters, files, API responses).
inputs:
  - -InputPath     # file to search (.txt, .log, .csv, .doc, .docx)
  - -KeywordsPath  # text file with one keyword per line; blanks and duplicates ignored
  - -OutputPath    # destination for results (overwritten if it exists)

# Outputs the script produces (files, console output, return objects).
outputs:
  - Text file at -OutputPath, one line per match in the form 'Keyword: <word> | Line: <#> | Context: <line>'
  - 'No matches found.' written to the output file when there are no hits
  - Console status on completion ('Done. Wrote <N> match(es) to: <path>')

# --- Cross-reference -------------------------------------------------------

# Free-form tags used by CAPABILITY_MATRIX.md. Prefer kebab-case. Reuse
# existing tags where they fit; add new ones sparingly.
tags:
  - file-system
  - forensics
  - triage
  - keyword-search
  - office
  - powershell

# --- Optional metadata -----------------------------------------------------

# maintainer: <name or GitHub handle>
# created: <YYYY-MM-DD>
# updated: <YYYY-MM-DD>
# related:
#   - <other-script-name>     # e.g. companion or downstream tool
notes: >
  Matching is case-insensitive and whole-word; partial-word matches are not
  produced. For .doc and .docx inputs the 'Line' value is the Word paragraph
  number, not the visual line number shown in Word, because Word documents
  do not store text in fixed lines. The script processes one file per run —
  recursion across a folder requires a wrapper loop. Does not support PDF,
  RTF, HTML, XLSX, PST, EML, or images, and does not perform OCR.
