# Manifest for a single script folder under scripts/<category>/<script-name>/
# Copy this file as manifest.yml inside the script folder and fill it in.
# Required fields are uncommented. Optional fields are commented out — uncomment
# any that apply.

# --- Identity --------------------------------------------------------------

# Short identifier — must match the script folder name (kebab-case).
name: get-file-metadata

# Human-readable title for catalog display.
display_name: Get All File Metadata

# One- to three-sentence description. Pulled into CATALOG.md.
summary: >
  Collects comprehensive file metadata for forensic triage and investigative
  review. Returns a structured PowerShell object containing filesystem info,
  NTFS alternate data streams, owner and ACL, MD5/SHA1/SHA256 hashes,
  Authenticode signature data, Windows Shell properties, Office Open XML
  metadata, embedded OLE objects, and best-effort PDF metadata. Pipeline-
  friendly with Get-ChildItem.

# --- Classification --------------------------------------------------------

# Top-level folder under scripts/.
category: file-system

language: PowerShell

# Production = stable, in active use.
# Beta       = functional but rough edges; review before production use.
# WIP        = under development; expect breakage.
status: Production

# --- Files in this folder --------------------------------------------------

# The script you invoke directly. For dot-sourced function files, name the
# file even though it is not "run" in the conventional sense.
entry_point: Get-AllFileMetadata.ps1

# Optional — list supporting scripts and what each one does. Omit for
# single-file scripts.
# components:
#   - name: <Helper-One.ps1>
#     description: <What this supporting script does.>

# Optional — non-script support files (config, lookup tables, etc.).
# support_files:
#   - name: whitelist.txt
#     description: One entry per line; lines starting with # are ignored.

# --- Runtime profile -------------------------------------------------------

requirements:
  os: Windows
  powershell: ">=5.1"
  software:
    - Microsoft Word  # optional; only needed for legacy .doc OLE-object inspection
  filesystem:
    - NTFS volume  # required for alternate data stream collection
  permissions:
    - Read access to target files and their ACLs

# --- Data flow -------------------------------------------------------------

# Inputs the script consumes (parameters, files, API responses).
inputs:
  - -Path  # file path; accepts pipeline value, including FullName from Get-ChildItem

# Outputs the script produces (files, console output, return objects).
outputs:
  - PSCustomObject on the pipeline with FileSystemInfo, Streams, Owner, ACL, Hashes, Authenticode, ShellProperties, OfficeProperties, EmbeddedObjects, PdfMetadata
  - JSON when piped to ConvertTo-Json | Out-File
  - CSV when projected with Select-Object | Export-Csv

# --- Cross-reference -------------------------------------------------------

# Free-form tags used by CAPABILITY_MATRIX.md. Prefer kebab-case. Reuse
# existing tags where they fit; add new ones sparingly.
tags:
  - file-system
  - forensics
  - triage
  - metadata
  - hashing
  - ntfs
  - authenticode
  - office
  - pdf
  - powershell

# --- Optional metadata -----------------------------------------------------

# maintainer: <name or GitHub handle>
# created: <YYYY-MM-DD>
# updated: <YYYY-MM-DD>
# related:
#   - hunt-for-alternate-datastreams  # narrower ADS-only helper
notes: >
  The function is dot-sourced (`. .\Get-AllFileMetadata.ps1`) before calling
  `Get-AllFileMetadata`. Behavior is best-effort: malformed, locked, or
  unsupported files produce empty sub-sections rather than errors. Office
  and PDF sections only populate for those file types; other files will
  show those keys as empty by design.
