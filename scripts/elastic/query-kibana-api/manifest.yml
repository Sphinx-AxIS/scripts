# Manifest for a single script folder under scripts/<category>/<script-name>/
# Copy this file as manifest.yml inside the script folder and fill it in.
# Required fields are uncommented. Optional fields are commented out — uncomment
# any that apply.

# --- Identity --------------------------------------------------------------

# Short identifier — must match the script folder name (kebab-case).
name: query-kibana-api

# Human-readable title for catalog display.
display_name: Query Kibana API

# One- to three-sentence description. Pulled into CATALOG.md.
summary: >
  Starter template for invoking a Kibana API endpoint with HTTP Basic
  Authentication. Encodes credentials, builds JSON request headers and
  body, sends a POST, and prints the response. Designed to be edited
  inline for a specific endpoint and payload.

# --- Classification --------------------------------------------------------

# Top-level folder under scripts/.
category: elastic

language: PowerShell

# Production = stable, in active use.
# Beta       = functional but rough edges; review before production use.
# WIP        = under development; expect breakage.
status: WIP

# --- Files in this folder --------------------------------------------------

# The script you invoke directly. For dot-sourced function files, name the
# file even though it is not "run" in the conventional sense.
entry_point: Kibana_API.ps1

# Optional — list supporting scripts and what each one does. Omit for
# single-file scripts.
# components:
#   - name: <Helper-One.ps1>
#     description: <What this supporting script does.>

# Optional — non-script support files (config, lookup tables, etc.).
# support_files:
#   - name: whitelist.txt
#     description: One entry per line; lines starting with # are ignored.

# --- Runtime profile -------------------------------------------------------

requirements:
  os: Cross-platform
  powershell: ">=5.1"
  network:
    - Kibana host
  credentials:
    - Kibana username and password (with permission for the target endpoint)

# --- Data flow -------------------------------------------------------------

# Inputs the script consumes (parameters, files, API responses).
inputs:
  - $KibanaUrl    # full URL to the target Kibana endpoint; edited inline at the top of the script
  - $Username     # Kibana account username; edited inline
  - $Password     # Kibana account password; edited inline
  - $RequestBody  # JSON body sent with the POST; edited inline (defaults to a match_all query)

# Outputs the script produces (files, console output, return objects).
outputs:
  - Parsed response object printed to the console on success
  - Error message printed to the console on failure

# --- Cross-reference -------------------------------------------------------

# Free-form tags used by CAPABILITY_MATRIX.md. Prefer kebab-case. Reuse
# existing tags where they fit; add new ones sparingly.
tags:
  - elastic
  - kibana
  - api
  - http
  - template
  - powershell

# --- Optional metadata -----------------------------------------------------

# maintainer: <name or GitHub handle>
# created: <YYYY-MM-DD>
# updated: <YYYY-MM-DD>
# related:
#   - <other-script-name>
notes: >
  WIP starter template. Credentials are inline plaintext — do not commit
  edited copies; switch to Get-Credential, an environment variable, or a
  secret store before broader use. The HTTP method is hardcoded to POST,
  and the default match_all body is Elasticsearch query DSL rather than a
  generic Kibana request shape; both should be adjusted for the specific
  endpoint being called.
